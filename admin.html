<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - HRTC</title>
<link rel="stylesheet" href="CSS/style.css">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

header{
    background:#003366;
    color:white;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card h2{
    margin:0;
    color:#003366;
    font-size:32px;
}

.card p{
    margin-top:10px;
    font-size:18px;
    color:#555;
}

.btn-area{
    text-align:center;
    margin:20px;
}

.btn{
    background:#003366;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:6px;
    margin:10px;
    display:inline-block;
}

.btn:hover{
    background:#0055aa;
}
</style>
</head>

<body>

<header>
HRTC Admin Dashboard
</header>

<div class="dashboard">

<div class="card">
<h2>Users</h2>
<p>Manage Registered Users</p>
</div>

<div class="card">
<h2>Bookings</h2>
<p>View Ticket Bookings</p>
</div>

<div class="card">
<h2>Messages</h2>
<p>Check Contact Queries</p>
</div>

<div class="card">
<h2>Buses</h2>
<p>Manage Bus Services</p>
</div>

</div>

<div class="btn-area">
<a href="index.html" class="btn">Go to Website</a>
<a href="login.html" class="btn">Logout</a>
</div>

</body>
</html>
