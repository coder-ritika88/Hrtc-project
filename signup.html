<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HRTC</title>
    <link rel="stylesheet" href="CSS/style.css">

    <script>
        async function signupUser(event) {
            event.preventDefault();

            const userData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                password: document.getElementById("password").value
            };

            try {
                const response = await fetch("http://localhost:5000/signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("✅ Signup successful! You can now login.");
                    document.getElementById("signupForm").reset();
                } else {
                    alert("❌ " + (result.message || "Signup failed"));
                }

            } catch (error) {
                console.error(error);
                alert("⚠️ Server not responding. Please try again later.");
            }
        }
    </script>
</head>

<body class="signup">

    <nav class="navbar">
        <div class="logo">HRTC</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="book.html">Book Ticket</a></li>
            <li><a href="help.html">Help Desk</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="routes.html">Routes</a></li>
            <li><a href="signup.html">Sign-Up</a></li>
        </ul>
    </nav>

    <section class="signup-form">
        <h2>Create Account</h2>

        <form id="signupForm" onsubmit="signupUser(event)">

            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter your phone" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <button type="submit">Sign Up</button>

        </form>
    </section>

    <script src="JAVASCRIPT/script.js"></script>

</body>
</html>
