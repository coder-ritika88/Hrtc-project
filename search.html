<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Buses</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        h3 {
            text-align: center;
            color: #444;
        }

        .bus-container {
            max-width: 800px;
            margin: auto;
        }

        .bus-card {
            background: #fff;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .bus-card:hover {
            transform: scale(1.02);
        }

        .bus-title {
            font-size: 18px;
            font-weight: bold;
            color: #222;
        }

        .bus-details {
            margin-top: 8px;
            line-height: 1.6;
        }

        .book-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .book-btn:hover {
            background: #0056b3;
        }

        /* Popup */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            animation: popupAnim 0.4s ease;
        }

        .popup-box button {
            margin-top: 15px;
            padding: 8px 15px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        @keyframes popupAnim {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<h2>🚌 Available Buses</h2>

<div class="bus-container" id="results"></div>

<div id="popup" class="popup">
    <div class="popup-box">
        <p id="popupText"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    const from = params.get("from") || "Delhi";
    const to = params.get("to") || "Shimla";
    const date = params.get("date") || new Date().toISOString().split('T')[0];

    const busList = [
        { name: "HRTC Ordinary", time: "05:30 AM", fare: "₹220", seats: 32 },
        { name: "HRTC Express", time: "07:15 AM", fare: "₹280", seats: 28 },
        { name: "HRTC Deluxe", time: "09:45 AM", fare: "₹350", seats: 24 },
        { name: "Him Gaurav AC", time: "12:30 PM", fare: "₹450", seats: 20 },
        { name: "HRTC Superfast", time: "03:00 PM", fare: "₹380", seats: 26 },
        { name: "Himmani Semi Deluxe", time: "06:45 PM", fare: "₹420", seats: 22 },
        { name: "Himsuta Volvo AC", time: "10:00 PM", fare: "₹850", seats: 18 }
    ];

    let output = `<h3>${from} → ${to} | Date: ${date}</h3>`;

    busList.forEach(bus => {
        output += `
            <div class="bus-card">
                <div class="bus-title">${bus.name}</div>
                <div class="bus-details">
                    🕒 Time: ${bus.time} <br>
                    💺 Seats Available: ${bus.seats} <br>
                    💰 Fare: ${bus.fare}
                </div>
                <button class="book-btn" onclick="bookBus('${bus.name}')">Book Now</button>
            </div>
        `;
    });

    document.getElementById("results").innerHTML = output;

    function bookBus(busName) {
        const popup = document.getElementById("popup");
        const popupText = document.getElementById("popupText");

        popupText.innerHTML = `
            🎉 Congratulations!<br><br>
            Your ticket for <b>${busName}</b><br>
            Route: <b>${from} → ${to}</b><br><br>
            ✅ Booking Successful!<br>
            Have a safe journey 🚌
        `;

        popup.style.display = "flex";
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }
</script>

</body>
</html>
